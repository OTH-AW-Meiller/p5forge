<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <m
    eta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>p5forge Browser Transpiler</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 120 120" role="img" focusable="false">
            <defs>
              <linearGradient id="forgePulse" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00fca8" />
                <stop offset="100%" stop-color="#00d9ff" />
              </linearGradient>
            </defs>
            <rect x="6" y="6" width="108" height="108" rx="14" class="logo-frame" />
            <path d="M20 34h80M20 86h80" class="logo-scan" />
            <path d="M26 60h10l8-14 8 28 8-20 8 14h26" class="logo-wave" />
            <text x="60" y="102" text-anchor="middle" class="logo-tag">P5</text>
          </svg>
        </div>
        <div class="topbar-text">
          <h1>p5forge</h1>
          <p>Processing (Java)-style to p5.js JavaScript directly in the browser</p>
        </div>
      </header>

      <section class="toolbar">
          <button id="btnRun" class="icon-btn" type="button" aria-label="Run preview" title="Run (F5)">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M8 6L19 12L8 18Z" />
                </svg>
            </button>
            <span class="hotkey-hint" aria-hidden="true">F5</span>
            <input id="fileInputPde" type="file" accept=".pde,text/plain" hidden />
            <button id="btnLoad" class="btn-secondary" type="button">Load .pde</button>
            <button id="btnSave" class="btn-secondary" type="button">Save .pde</button>
            <button id="btnExportJs" class="btn-secondary" type="button">Export .js</button>
            <button id="btnHelp" class="btn-secondary" type="button" title="Open Processing Reference">Help</button>
      </section>

      <section class="statusbar">
        <span id="statusText">Ready.</span>
      </section>

      <section class="editors">
        <article class="panel editor-panel">
          <h2>Input (Processing-style)</h2>
          <div class="editor-shell">
            <div class="editor-toolbar">
              <input id="sketchName" class="editor-name-input" type="text" value="sketch.pde" aria-label="Sketch file name" />
            </div>
            <div class="editor-body">
              <pre id="lineNumbers" aria-hidden="true">1</pre>
              <div class="code-area">
                <pre id="highlightLayer" aria-hidden="true"></pre>
                <textarea id="inputCode" spellcheck="false"></textarea>
              </div>
            </div>
          </div>
        </article>

        <article class="panel preview-panel" id="previewWindow">
          <header class="preview-titlebar" id="previewTitlebar">
            <span class="preview-title" id="previewTitle">Preview</span>
            <button id="btnPreviewClose" class="preview-close" type="button" aria-label="Stop preview" title="Stop">&times;</button>
          </header>
          <iframe id="previewFrame" title="p5.js Preview" sandbox="allow-scripts" allow="accelerometer; gyroscope; magnetometer"></iframe>
        </article>
      </section>

    </main>

    <script type="module" src="./src/browser-app.js"></script>
  </body>
</html>
